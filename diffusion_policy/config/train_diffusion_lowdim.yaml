defaults:
  - _self_
  - task: robocasa/OpenCabinet

name: train_diffusion_lowdim_state_based
_target_: diffusion_policy.workspace.train_diffusion_transformer_hybrid_workspace.TrainDiffusionTransformerHybridWorkspace

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "state_based_no_gpu"

horizon: 10
n_obs_steps: 2
n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
past_action_visible: False
keypoint_visible_rate: 1.0
obs_as_cond: True

# ============= Low-Dim MLP Policy (No Images) =============
policy:
  _target_: diffusion_policy.policy.diffusion_unet_image_policy.DiffusionUnetImagePolicy
  shape_meta: ${shape_meta}
  
  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    variance_type: fixed_small
    clip_sample: True
    prediction_type: epsilon

  horizon: ${horizon}
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 100

  # For low-dim: no image processing needed
  # The network will directly process state observations
  crop_shape: null
  obs_encoder_group_norm: True
  eval_fixed_crop: False

  # Lighter architecture for CPU training
  # (These are UNet-style architecture parameters)
  n_layer: 6  # Reduced from 12
  n_cond_layers: 2  # Reduced from 4
  n_head: 4  # Reduced from 8
  n_emb: 256  # Reduced from 512
  p_drop_emb: 0.0
  p_drop_attn: 0.1  # Reduced from 0.3
  causal_attn: True
  time_as_cond: True
  obs_as_cond: ${obs_as_cond}

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

# ============= CRITICAL: Reduced for CPU/Memory =============
dataloader:
  batch_size: 32  # REDUCED from 192
  num_workers: 2  # REDUCED from 64 (THIS WAS KILLING MEMORY)
  shuffle: True
  pin_memory: False  # CPU doesn't need pinned memory
  persistent_workers: False

val_dataloader:
  batch_size: 32  # REDUCED from 192
  num_workers: 2  # REDUCED from 64
  shuffle: False
  pin_memory: False
  persistent_workers: False

optimizer:
  transformer_weight_decay: 1.0e-3
  obs_encoder_weight_decay: 1.0e-6
  learning_rate: 1.0e-4
  betas: [0.9, 0.95]

# ============= Training: CPU-Friendly =============
training:
  device: "cpu"  # CHANGED from cuda:0 to cpu
  seed: 42
  debug: False
  resume: False
  # optimization
  lr_scheduler: cosine
  lr_warmup_steps: 500  # Reduced from 1000
  num_epochs: 100  # Reduced from 1000 (for testing)
  gradient_accumulate_every: 1
  use_ema: True
  # training loop control
  rollout_every: null
  checkpoint_every: 50  # Reduced from 100
  val_every: 25  # Reduced from 50
  sample_every: 25  # Reduced from 50
  # steps per epoch
  max_train_steps: 500
  max_val_steps: null
  # misc
  tqdm_interval_sec: 1.0

logging:
  project: diffusion_policy_state_based_cpu
  resume: False
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags: ["${name}", "${task_name}", "${exp_name}", "cpu", "lowdim"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 5  # Reduced from 20 to save disk space
    format_str: 'epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}