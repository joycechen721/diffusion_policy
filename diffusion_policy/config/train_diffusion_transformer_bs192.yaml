defaults:
  - _self_
  - task: robocasa/OpenCabinet

name: train_diffusion_lowdim_m2
_target_: diffusion_policy.workspace.train_diffusion_transformer_hybrid_workspace.TrainDiffusionTransformerHybridWorkspace

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "m2_optimized_cpu_transformer"

horizon: 10
n_obs_steps: 2
n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
past_action_visible: False
keypoint_visible_rate: 1.0
obs_as_cond: True

# ============= Dimension Definitions =============
obs_dim: 16
action_dim: 12

# ============= M2-OPTIMIZED POLICY =============
# KEY CHANGES: Smaller transformer, fewer diffusion steps
policy:
    _target_: diffusion_policy.policy.diffusion_transformer_hybrid_image_policy.DiffusionTransformerHybridImagePolicy

    shape_meta: ${shape_meta}
    
    noise_scheduler:
      _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
      num_train_timesteps: 50  # REDUCED from 100 (fewer timesteps = fewer denoising steps)
      beta_start: 0.0001
      beta_end: 0.02
      beta_schedule: squaredcos_cap_v2
      variance_type: fixed_small
      clip_sample: True
      prediction_type: epsilon

    horizon: ${horizon}
    n_action_steps: ${n_action_steps}
    n_obs_steps: ${n_obs_steps}
    num_inference_steps: 20  # REDUCED from 100 (huge speedup for inference)
    
    # Transformer architecture - MUCH SMALLER
    n_layer: 4  # REDUCED from 8 (half the layers)
    n_head: 2  # REDUCED from 4 (fewer attention heads)
    n_emb: 128  # REDUCED from 256 (smaller embeddings)
    p_drop_emb: 0.1  # Slight regularization
    p_drop_attn: 0.2  # REDUCED from 0.3 (less aggressive dropout)
    causal_attn: True
    time_as_cond: True
    
    # Vision backbone - SMALLEST
    vision_backbone: "resnet18"  # Smallest ResNet
    crop_shape: [64, 64]  # REDUCED from (76, 76) (smaller crops = faster)
    obs_encoder_group_norm: True  # ENABLED (better for CPU)
    eval_fixed_crop: False
    
    obs_as_cond: True
    pred_action_steps_only: False

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

# ============= M2-OPTIMIZED DATALOADER =============
# KEY CHANGES: Smaller batches, fewer workers
dataloader:
  batch_size: 16  # REDUCED from 32 (huge memory savings on CPU)
  num_workers: 1  # REDUCED from 2 (M2 only has 8 cores total, most are efficiency cores)
  shuffle: True
  pin_memory: False
  persistent_workers: False

val_dataloader:
  batch_size: 16  # REDUCED from 32
  num_workers: 1
  shuffle: False
  pin_memory: False
  persistent_workers: False

optimizer:
  transformer_weight_decay: 1.0e-3
  obs_encoder_weight_decay: 1.0e-6
  learning_rate: 1.0e-4
  betas: [0.9, 0.95]

# ============= M2-OPTIMIZED TRAINING =============
# KEY CHANGES: Fewer steps per epoch, more aggressive sampling intervals
training:
  device: "mps"
  seed: 42
  debug: False
  resume: False
  # optimization
  lr_scheduler: cosine
  lr_warmup_steps: 100  # REDUCED from 500 (fewer warmup steps)
  num_epochs: 50
  gradient_accumulate_every: 1
  use_ema: True
  # training loop control
  rollout_every: null  # Disable rollouts on CPU (they're slow)
  checkpoint_every: 10  # INCREASED from 50 (checkpoint more frequently but you won't run many epochs)
  val_every: 5  # INCREASED from 25 (validate more often with fewer steps)
  sample_every: 5  # INCREASED from 25 (sample more often)
  # steps per epoch - THIS IS KEY
  max_train_steps: 50  # REDUCED from 500 (10x fewer training steps per epoch!)
  max_val_steps: 10  # REDUCED from null (limit validation)
  # misc
  tqdm_interval_sec: 1.0

logging:
  project: diffusion_policy_m2_optimized
  resume: False
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags: ["${name}", "${task_name}", "${exp_name}", "m2", "cpu", "optimized"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 3  # REDUCED from 5 (save fewer checkpoints)
    format_str: 'epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
